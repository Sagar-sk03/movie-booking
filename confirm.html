<!DOCTYPE html>
<html>
<head>
  <title>Booking Confirmed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="confirm-body">

<div class="ticket fade-in">

    <!-- LEFT POSTER -->
    <img id="posterImg">

    <!-- RIGHT CONTENT -->
    <div class="ticket-content">

        <h1>🎉 Booking Confirmed!</h1>

        <p><strong>🎬 Movie:</strong> <span id="movie"></span></p>
        <p><strong>🪑 Seats:</strong> <span id="seats"></span></p>
        <p><strong>💰 Total:</strong> ₹<span id="total"></span></p>
        <p><strong>🆔 Booking ID:</strong> <span id="bookingId"></span></p>

        <!-- ONLY ONE QR -->
        <div class="qr">
            <img id="qrImg" />
        </div>

        <p>🍿 Enjoy your movie!</p>

        <!-- BUTTONS -->
        <button class="print-btn" onclick="printTicket()">🖨 Print Ticket</button>
        <button class="print-btn" onclick="goHome()">🏠 Home</button>

    </div>
</div>

<script src="ticket.js"></script>

<script>
let movie = localStorage.getItem("movie");
let seats = localStorage.getItem("seats");
let total = localStorage.getItem("total");

// booking id
let bookingId = localStorage.getItem("bookingId") || "BK" + Math.floor(Math.random()*100000);

document.getElementById("movie").innerText = movie;
document.getElementById("seats").innerText = seats;
document.getElementById("total").innerText = total;
document.getElementById("bookingId").innerText = bookingId;
document.getElementById("posterImg").src =
  localStorage.getItem("poster");
  
// QR dynamic
document.getElementById("qrImg").src =
  `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${bookingId}`;

function goHome(){
  window.location.href = "index.html";
}

function printTicket() {
  window.print();
}
</script>

</body>
</html>
